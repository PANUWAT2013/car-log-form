<style>

.app{max-width:860px;margin:0 auto;min-height:100vh}
.header{background:linear-gradient(135deg,#0d2b5e,#1a4a8a);color:#fff;padding:14px 20px;box-shadow:0 4px 12px rgba(13,43,94,.35)}

.body{padding:14px}

.stat-val{font-size:20px;font-weight:800}

.card-title{font-size:14px;font-weight:700;color:#1a4a8a;margin-bottom:12px}

input[type=date].inp,input[type=time].inp{cursor:pointer}
.readonly{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;color:#64748b}

.btn-primary{background:linear-gradient(135deg,#1a4a8a,#0d2b5e);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;box-shadow:0 3px 10px rgba(26,74,138,.3)}

.btn-outline{background:#fff;color:#1a4a8a;border:2px solid #1a4a8a;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
.btn-sm-success{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}

.divider{height:1px;background:#e2e8f0;margin:10px 0}

.vtype-btn.gov{background:linear-gradient(135deg,#1a4a8a,#0d2b5e);color:#fff}

.tag-gov{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af}
.tag-own{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#cffafe;color:#0e7490}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;font-weight:700;color:#475569;white-space:nowrap;border-bottom:2px solid #e2e8f0;background:#f8fafc;text-align:left}
.tbl td{padding:7px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tr:hover td{background:#f0f9ff}
.gs-badge{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:7px 12px;font-size:12px;color:#2e7d32;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.saving-overlay{position:fixed;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:300;font-size:15px;font-weight:700;color:#1a4a8a}
.err-bar{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:12px;color:#dc2626;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.setup-box{background:#fff;border-radius:16px;padding:24px;margin:20px auto;max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.setup-box h2{color:#1a4a8a;font-size:17px;margin-bottom:16px}
.setup-box ol{padding-left:18px;font-size:13px;color:#475569;line-height:2}
.setup-box code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;color:#1a4a8a}
</style>

<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
//  ⚠️  แก้ไข SCRIPT_URL ตรงนี้ก่อนใช้งาน
//  วิธีได้ URL: Google Sheet → Extensions → Apps Script
//  → Deploy → New deployment → Web app → Copy URL
// ═══════════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr6Qej9enx9CEy-Ax9ZTB5DQoSnzvowVCPwXWGBcIJ_6f40pRX9VBgN69jZYYt4bVGRA/exec";

// ───────────────────────────────────────────────────────────
const {useState,useEffect,useCallback} = React;

const USERS = [
  {name:"นางพรทิพย์ คมเฉียบ",      pos:"ผู้อำนวยการ สอน.บ้านโคกแสง"},
  {name:"นางเยาวลักษณ์ คำบุญ",      pos:"พยาบาลวิชาชีพชำนาญการ"},
  {name:"นางสาวอัญชลี บุตรโต",      pos:"พยาบาลวิชาชีพชำนาญการ"},
  {name:"ว่าที่ ร.ต. จักพันธ์ อรรคฮาด",pos:"นักวิชาการสาธารณสุขชำนาญการ"},
  {name:"นางสาวจิตตาวดี แสนมั่น",   pos:"นักวิชาการสาธารณสุขปฏิบัติการ"},
  {name:"นางสาวจุฑาทิพย์ เรียมแสน", pos:"แพทย์แผนไทยปฏิบัติการ"},
  {name:"นางสุทธิดา อรรคฮาด",       pos:"เจ้าพนักงานเภสัชกรรมปฏิบัติงาน"},
  {name:"นายภานุวัฒน์ ศรีแก้ว",     pos:"นักวิชาการสาธารณสุข"},
  {name:"นายบัวลี แก้วอัคฮาด",      pos:"พนักงานทั่วไป"},
  {name:"นายพรชัย ชะรินทร์",        pos:"พนักงานช่วยเหลือคนไข้"},
  {name:"นางสุพัตรา ประทุมโสม",     pos:"พนักงานช่วยการพยาบาล(ผู้ช่วยแพทย์แผนไทย)"},
];
const DRIVERS = ["นายพรชัย ชะรินทร์","นายบัวลี แก้วอัคฮาด","ขับเอง"];

const pn = s => parseFloat(String(s||"").replace(/,/g,""))||0;
const fn = n => {
  if(n===""||n===null||n===undefined) return "";
  const x=pn(n); return isNaN(x)?"":x.toLocaleString("th-TH",{maximumFractionDigits:2});
};
const today     = () => new Date().toISOString().split("T")[0];
const nowT      = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+"."+String(d.getMinutes()).padStart(2,"0"); };
const shortName = s => s?s.replace(/^(นางสาว|นาง|นาย|ว่าที่ ร\.ต\. )\s*/,""):"";
const arrStr    = v => Array.isArray(v)?v.filter(Boolean).join(" / "):v||"-";
const fmtDate   = s => {
  if(!s) return "-";
  const str = String(s).trim();
  // DD/MM/YYYY อยู่แล้ว → คืนตรงๆ (ปีอาจเป็น พ.ศ. แล้ว)
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return str;
  // แยก date part จาก ISO
  const datePart = str.includes("T") ? str.split("T")[0] : str;
  const r = datePart.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!r) return str;
  const yr = parseInt(r[1]);
  // ถ้าปีมากกว่า 2500 แสดงว่าเป็น พ.ศ. แล้ว ไม่ต้องบวกอีก
  const be = yr > 2500 ? yr : yr + 543;
  return r[3] + "/" + r[2] + "/" + be;
};
const fmtTime   = s => {
  if(!s) return "";
  const str = String(s).trim();
  // HH:MM อยู่แล้ว
  if(/^\d{2}:\d{2}$/.test(str)) return str;
  // ISO หรือ 1899-... → เอาแค่ HH:MM หลัง T
  if(str.includes("T")) return str.split("T")[1].slice(0,5);
  return str.slice(0,5);
};

const emptyF = () => ({
  id:Date.now(), timestamp:new Date().toISOString(),
  user:"",position:"",driver:"",recorder:"",
  vehicleType:"official", places:[""], purposes:[""],
  departDate:today(), kmOut:"", departTime:nowT(),
});
const emptyR = () => ({kmIn:"",returnDate:today(),returnTime:nowT(),fuelLiters:"",fuelPrice:"",note:"",extraPlaces:[""],extraPurposes:[""]});

/* API */
const isConfigured = () => SCRIPT_URL && !SCRIPT_URL.includes("ใส่-URL");
const api = {
  get: async () => {
    const res = await fetch(SCRIPT_URL+"?action=getAll&t="+Date.now());
    return res.json();
  },
  post: async body => {
    const res = await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body)});
    return res.json();
  },
};

/* ── NumInput ── */
function NumInput({value,onChange,placeholder}){
  const ref = React.useRef(null);
  const display = fn(value);
  const handleChange = e => {
    const raw = e.target.value.replace(/[^0-9.]/g,"");
    onChange(raw);
    // ตั้ง cursor ให้อยู่ท้ายสุดหลัง format
    setTimeout(()=>{ if(ref.current){ const len=ref.current.value.length; ref.current.setSelectionRange(len,len); } },0);
  };
  return React.createElement("input",{
    ref, className:"inp", inputMode:"decimal", placeholder,
    value: display,
    onChange: handleChange,
    onBlur: e=>{ onChange(e.target.value.replace(/[^0-9.]/g,"")); }
  });
}

/* ── TimePicker ── */
function TimePicker({value, onChange}){
  const toInput   = v => v ? String(v).replace(".",":") : "";
  const fromInput = v => v ? v.replace(":",".") : "";
  return React.createElement("input",{
    type:"time", className:"inp",
    value: toInput(value),
    onChange: e => onChange(fromInput(e.target.value))
  });
}

/* ── Field ── */
function Field({label,req,children}){
  return React.createElement("div",{className:"field"},
    React.createElement("label",{className:"lbl"},label,req&&React.createElement("span",{className:"req"},"*")),
    children
  );
}

/* ══ APP ══ */
function App(){
  const [tab,setTab]           = useState(0);
  const [records,setRecords]   = useState([]);
  const [drafts,setDrafts]     = useState([]);
  const [form,setForm]         = useState(emptyF());
  const [retModal,setRetModal] = useState(null);
  const [retForm,setRetForm]   = useState(emptyR());
  const [toast,setToast]       = useState("");
  const [loading,setLoading]   = useState(true);
  const [error,setError]       = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3000); };

  const fetchAll = useCallback(async()=>{
    if(!isConfigured()){ setLoading(false); return; }
    try{
      setError("");
      const data = await api.get();
      if(data.ok){ setRecords(data.records||[]); setDrafts(data.drafts||[]); }
      else setError("โหลดข้อมูลไม่สำเร็จ: "+data.error);
    }catch(e){
      setError("เชื่อมต่อ Google Sheets ไม่ได้ — ตรวจสอบ SCRIPT_URL และการ Deploy");
    }finally{ setLoading(false); }
  },[]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const h = React.createElement;
  const setF       = (k,v) => setForm(f=>({...f,[k]:v}));
  const setPlace   = (i,v) => setForm(f=>{ const a=[...f.places];   a[i]=v; return{...f,places:a}; });
  const setPurpose = (i,v) => setForm(f=>{ const a=[...f.purposes]; a[i]=v; return{...f,purposes:a}; });
  const onUser     = name  => { const u=USERS.find(x=>x.name===name); setForm(f=>({...f,user:name,position:u?.pos||"",recorder:name})); };

  const saveDraft = async()=>{
    if(!form.user)      {showToast("⚠️ กรุณาเลือกผู้ใช้รถ");return;}
    if(!form.departDate){showToast("⚠️ กรุณากรอกวันที่ออก");return;}
    if(!form.departTime){showToast("⚠️ กรุณากรอกเวลาออก");return;}
    if(!form.driver)    {showToast("⚠️ กรุณาเลือกพนักงานขับรถ");return;}
    if(!(form.places||[]).filter(Boolean).length){showToast("⚠️ กรุณากรอกสถานที่ไป");return;}
    if(!(form.purposes||[]).filter(Boolean).length){showToast("⚠️ กรุณากรอกวัตถุประสงค์");return;}
    if(form.vehicleType==="official"&&!form.kmOut){showToast("⚠️ กรุณากรอกกิโลเมตรขาออก");return;}
    if(form.vehicleType==="official"&&form.kmOut){
      const lastRec = [...records].filter(r=>r.vehicleType==="official"&&r.kmIn).pop();
      if(lastRec&&pn(form.kmOut)<pn(lastRec.kmIn)){
        showToast("⚠️ กม.ขาออก ("+fn(form.kmOut)+") ต้องมากกว่า กม.ขากลับครั้งก่อน ("+fn(lastRec.kmIn)+")");
        return;
      }
    }
    const draft = {...form, status:"draft"};
    // อัปเดต state ทันที ไม่รอ Sheets
    setDrafts(d=>[...d, draft]);
    setForm(emptyF());
    setTab(2);
    showToast("✅ บันทึกฉบับร่างเรียบร้อย");
    // sync ใน background
    api.post({action:"saveDraft", data:draft}).catch(()=>showToast("⚠️ sync ไม่สำเร็จ"));
  };

  const submitReturn = async()=>{
    if(!retForm.kmIn&&retModal.vehicleType==="official"){showToast("⚠️ กรุณากรอกกิโลเมตรขากลับ");return;}
    if(retModal.vehicleType==="official"&&retForm.kmIn&&pn(retForm.kmIn)<pn(retModal.kmOut)){showToast("⚠️ กิโลเมตรขากลับต้องมากกว่าขาออก ("+fn(retModal.kmOut)+" กม.)");return;}
    if(retModal.vehicleType==="own"&&!retForm.totalDist){showToast("⚠️ กรุณากรอกระยะทางรวมทั้งหมด");return;}
    if(!retForm.returnDate){showToast("⚠️ กรุณากรอกวันที่กลับ");return;}
    if(!retForm.returnTime){showToast("⚠️ กรุณากรอกเวลากลับ");return;}
    const dist = retModal.vehicleType==="official"
      ? Math.max(0,pn(retForm.kmIn)-pn(retModal.kmOut))
      : pn(retForm.totalDist);
    const cost = pn(retForm.fuelLiters)*pn(retForm.fuelPrice);
    const origPlaces   = Array.isArray(retModal.places)?retModal.places:[];
    const origPurposes = Array.isArray(retModal.purposes)?retModal.purposes:[];
    const extraPl = (retForm.extraPlaces||[]).filter(Boolean);
    const extraPu = (retForm.extraPurposes||[]).filter(Boolean);
    const done = {
      ...retModal,...retForm,
      places:   [...origPlaces,   ...extraPl],
      purposes: [...origPurposes, ...extraPu],
      distance:dist, totalFuelCost:cost,
      status:"complete", completedAt:new Date().toISOString()
    };
    // อัปเดต state ทันที
    setRecords(r=>[...r, done]);
    setDrafts(d=>d.filter(x=>x.id!==retModal.id));
    setRetModal(null);
    setTab(0);
    showToast("✅ บันทึกเสร็จสมบูรณ์");
    // sync ใน background
    api.post({action:"completeDraft", data:done}).catch(()=>showToast("⚠️ sync ไม่สำเร็จ"));
  };

  const delRec = async id=>{
    if(!confirm("ลบรายการนี้?"))return;
    setRecords(r=>r.filter(x=>x.id!==id));
    showToast("🗑 ลบเรียบร้อย");
    api.post({action:"deleteRecord",id}).catch(()=>showToast("⚠️ sync ไม่สำเร็จ"));
  };
  const delDrf = async id=>{
    if(!confirm("ลบฉบับร่างนี้?"))return;
    setDrafts(d=>d.filter(x=>x.id!==id));
    showToast("🗑 ลบเรียบร้อย");
    api.post({action:"deleteDraft",id}).catch(()=>showToast("⚠️ sync ไม่สำเร็จ"));
  };

  const totalKm     = records.reduce((s,r)=>s+pn(r.distance),0);
  const totalLiters = records.reduce((s,r)=>s+pn(r.fuelLiters),0);
  const totalBaht   = records.reduce((s,r)=>s+pn(r.totalFuelCost),0);

  const exportXlsx = ()=>{
    const data = records.map((r,i)=>({
      "ลำดับ":i+1,
      "วันที่บันทึก":r.timestamp?new Date(r.timestamp).toLocaleDateString("th-TH"):"",
      "ผู้ใช้รถ":r.user,"ตำแหน่ง":r.position,
      "ประเภทรถ":r.vehicleType==="official"?"รถราชการ":"รถเจ้าหน้าที่",
      "สถานที่ไป":arrStr(r.places),"ไปเพื่อ":arrStr(r.purposes),
      "เลขกิโลเมตรออก":r.vehicleType==="official"?pn(r.kmOut):"",
      "วันที่ออก":r.departDate,"เวลาออก":r.departTime,
      "เลขกิโลเมตรกลับ":r.vehicleType==="official"?pn(r.kmIn):"",
      "วันที่กลับ":r.returnDate,"เวลากลับ":r.returnTime,
      "ระยะทาง (กม.)":r.vehicleType==="official"?pn(r.distance):"",
      "เบิกน้ำมัน (ลิตร)":pn(r.fuelLiters),
      "ราคาน้ำมัน (บาท/ลิตร)":pn(r.fuelPrice),
      "ราคาน้ำมัน (บาท)":pn(r.totalFuelCost),
      "พนักงานขับรถ":r.driver==="ขับเอง"?r.user:r.driver,
      "ผู้บันทึก":shortName(r.recorder),
      "หมายเหตุ":r.note||"",
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    ws["!cols"]=[6,14,20,28,12,22,22,14,12,8,14,12,8,12,12,14,12,20,18,16].map(w=>({wch:w}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"บันทึกการใช้รถ");
    XLSX.writeFile(wb,"vehicle_log_"+today()+".xlsx");
  };

  /* ── หน้า setup ถ้ายังไม่ได้ใส่ URL ── */
  if(!isConfigured()) return h("div",{style:{padding:16}},
    h("div",{className:"header",style:{borderRadius:12,marginBottom:16}},
      h("div",{style:{fontSize:17,fontWeight:800}},"📋 บันทึกการใช้รถราชการ"),
      h("div",{style:{fontSize:12,opacity:.8,marginTop:2}},"สอน.บ้านโคกแสง · สกลนคร")
    ),
    h("div",{className:"setup-box"},
      h("h2",null,"⚙️ ตั้งค่า SCRIPT_URL ก่อนใช้งาน"),
      h("p",{style:{fontSize:13,color:"#64748b",marginBottom:16,lineHeight:1.7}},
        "ไฟล์นี้เชื่อมต่อกับ Google Sheets ผ่าน Apps Script ",
        h("br",null),"กรุณาทำตามขั้นตอนแล้วแก้ไขไฟล์ HTML ตรงบรรทัด ",
        h("code",null,"const SCRIPT_URL = ...")
      ),
      h("ol",null,
        h("li",null,'เปิด Google Sheets → ',h("code",null,"Extensions → Apps Script")),
        h("li",null,"วางโค้ดจากไฟล์ ",h("code",null,"Code.gs")," แล้ว Save"),
        h("li",null,h("code",null,"Deploy → New deployment → Web app")),
        h("li",null,"Execute as: ",h("code",null,"Me")," | Who has access: ",h("code",null,"Anyone")),
        h("li",null,"คัดลอก URL ที่ได้"),
        h("li",null,'เปิดไฟล์ HTML นี้ด้วย Notepad → แก้บรรทัด ',h("code",null,'const SCRIPT_URL = "ใส่-URL..."'),' → Save → เปิดใหม่')
      )
    )
  );

  /* ── Loading ── */
  if(loading) return h("div",{style:{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{textAlign:"center",color:"#1a4a8a"}},
      h("div",{style:{fontSize:32,marginBottom:10}},"🚗"),
      h("div",{style:{fontSize:14}},"กำลังโหลดข้อมูลจาก Google Sheets...")
    )
  );

  const places   = Array.isArray(form.places)?form.places:[""];
  const purposes = Array.isArray(form.purposes)?form.purposes:[""];

  /* ── TAB 0 ── */
  const Tab0 = ()=> h("div",null,
    h("div",{className:"stats"},
      ...[["กม.รวม",fn(totalKm)],["ลิตรรวม",fn(totalLiters)],["บาทรวม",fn(totalBaht)]].map(([l,v])=>
        h("div",{className:"stat",key:l},h("div",{className:"stat-val"},v||"0"),h("div",{className:"stat-label"},l))
      )
    ),
    h("button",{className:"btn-primary",onClick:exportXlsx},"📊 ออกรายงาน Excel"),
    h("div",{className:"card",style:{padding:"12px 10px"}},
      h("div",{className:"card-title"},"📜 รายการทั้งหมด ("+records.length+" รายการ)"),
      records.length===0 ? h("div",{className:"empty"},"ยังไม่มีรายการ") :
      h("div",{style:{overflowX:"auto"}},
        h("table",{className:"tbl"},
          h("thead",null,h("tr",null,
            ...[["#","center",28],["ผู้ใช้รถ","left",140],["สถานที่","left",100],["ไปเพื่อ","left",100],
                ["วันที่ออก","center",82],["ประเภทรถ","center",72],
                ["กม.","right",52],["ลิตร","right",44],["บาท","right",62],["","center",30]]
            .map(([t,a,w])=>h("th",{key:t,style:{textAlign:a,width:w}},t))
          )),
          h("tbody",null,
            [...records].reverse().map((r,i)=>{
              const pl=arrStr(r.places); const pu=arrStr(r.purposes);
              return h("tr",{key:r.id},
                h("td",{style:{textAlign:"center",color:"#94a3b8",fontWeight:600,fontSize:11}},records.length-i),
                h("td",{style:{fontWeight:600,color:"#1a4a8a",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.user),
                h("td",{style:{color:"#475569",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},pl),
                h("td",{style:{color:"#475569",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},pu),
                h("td",{style:{textAlign:"center",color:"#475569",whiteSpace:"nowrap"}},fmtDate(r.departDate)),
                h("td",{style:{textAlign:"center"}},h("span",{className:r.vehicleType==="own"?"tag-own":"tag-gov"},r.vehicleType==="own"?"ส่วนตัว":"ราชการ")),
                h("td",{style:{textAlign:"right",color:"#475569"}},r.vehicleType==="official"&&pn(r.distance)>0?fn(r.distance):"-"),
                h("td",{style:{textAlign:"right",color:"#475569"}},r.fuelLiters?fn(r.fuelLiters):"-"),
                h("td",{style:{textAlign:"right",color:"#16a34a",fontWeight:600}},pn(r.totalFuelCost)>0?fn(r.totalFuelCost):"-"),
                h("td",{style:{textAlign:"center"}},h("button",{className:"btn-sm-danger",onClick:()=>delRec(r.id)},"🗑"))
              );
            })
          )
        )
      )
    )
  );

  /* ── TAB 1 ── */
  const Tab1 = ()=> h("div",null,
    h("div",{className:"card"},
      h("div",{className:"card-title"},"👤 ผู้ใช้รถ"),
      h(Field,{label:"ผู้ใช้รถ",req:true},
        h("select",{className:"sel",value:form.user,onChange:e=>onUser(e.target.value)},
          h("option",{value:""},"-- เลือกผู้ใช้รถ --"),
          ...USERS.map(u=>h("option",{key:u.name,value:u.name},u.name))
        )
      ),
      form.position&&h(Field,{label:"ตำแหน่ง"},h("div",{className:"readonly"},form.position)),
      h("div",{className:"row2"},
        h(Field,{label:"พนักงานขับรถ"},
          h("select",{className:"sel",value:form.driver,onChange:e=>setF("driver",e.target.value)},
            h("option",{value:""},"-- เลือก --"),
            ...DRIVERS.map(d=>h("option",{key:d,value:d},d))
          )
        ),
        h(Field,{label:"ผู้บันทึก"},h("div",{className:"readonly"},form.user?shortName(form.user):"-"))
      ),
      form.driver==="ขับเอง"&&form.user&&h("div",{style:{fontSize:12,color:"#16a34a",background:"#f0fdf4",padding:"6px 10px",borderRadius:8}},"✓ ผู้ขับ: "+form.user)
    ),
    h("div",{className:"card"},
      h("div",{className:"card-title"},"📍 สถานที่ไป"),
      ...places.map((p,i)=>h("div",{key:i,style:{display:"flex",gap:6,marginBottom:8}},
        h("input",{className:"inp",style:{flex:1},placeholder:"สถานที่ "+(i+1),value:p,onChange:e=>setPlace(i,e.target.value)}),
        i>0&&h("button",{className:"btn-sm-danger",onClick:()=>setForm(f=>({...f,places:f.places.filter((_,j)=>j!==i)}))},  "✕")
      )),
      places.length<5&&h("button",{className:"add-btn",onClick:()=>setForm(f=>({...f,places:[...f.places,""]}))},  "+ เพิ่มสถานที่")
    ),
    h("div",{className:"card"},
      h("div",{className:"card-title"},"🎯 ไปเพื่อ"),
      ...purposes.map((p,i)=>h("div",{key:i,style:{display:"flex",gap:6,marginBottom:8}},
        h("input",{className:"inp",style:{flex:1},placeholder:"วัตถุประสงค์ "+(i+1),value:p,onChange:e=>setPurpose(i,e.target.value)}),
        i>0&&h("button",{className:"btn-sm-danger",onClick:()=>setForm(f=>({...f,purposes:f.purposes.filter((_,j)=>j!==i)}))},  "✕")
      )),
      purposes.length<5&&h("button",{className:"add-btn",onClick:()=>setForm(f=>({...f,purposes:[...f.purposes,""]}))},  "+ เพิ่มวัตถุประสงค์")
    ),
    h("div",{className:"card"},
      h("div",{className:"card-title"},"🚗 ข้อมูลออกเดินทาง"),
      h("div",{className:"field"},
        h("label",{className:"lbl"},"ประเภทรถ"),
        h("div",{className:"vtype-toggle"},
          h("button",{className:"vtype-btn"+(form.vehicleType==="official"?" gov":""),onClick:()=>setF("vehicleType","official")},"🏛 รถราชการ"),
          h("button",{className:"vtype-btn"+(form.vehicleType==="own"?" own":""),onClick:()=>setF("vehicleType","own")},"🚙 รถเจ้าหน้าที่")
        )
      ),
      h("div",{className:"row2"},
        h(Field,{label:"วันที่ออก",req:true},h("input",{type:"date",className:"inp",value:form.departDate,onChange:e=>setF("departDate",e.target.value)})),
        h(Field,{label:"เวลาออก"},h(TimePicker,{value:form.departTime,onChange:v=>setF("departTime",v)}))
      ),
      form.vehicleType==="official"&&h(Field,{label:"เลขกิโลเมตรขาออก",req:true},
        h(NumInput,{value:form.kmOut,onChange:v=>setF("kmOut",v),placeholder:"เช่น 12,345"}),
        (()=>{
          const lastRec=[...records].filter(r=>r.vehicleType==="official"&&r.kmIn).pop();
          return lastRec?h("div",{style:{fontSize:11,color:"#64748b",marginTop:4}},
            "กม.ขากลับครั้งก่อน: "+fn(lastRec.kmIn)+" | ต้องกรอกมากกว่านี้"
          ):null;
        })()
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"auto 1fr",gap:8}},
      h("button",{className:"btn-outline",style:{whiteSpace:"nowrap"},onClick:()=>setTab(0)},"🏠 หน้าแรก"),
      h("button",{className:"btn-success",onClick:saveDraft},"💾 บันทึกฉบับร่าง (รอกรอกขากลับ)")
    )
  );

  /* ── TAB 2 ── */
  const Tab2 = ()=> h("div",null,
    h("div",{className:"card"},
      h("div",{className:"card-title"},"📝 รายการรอขากลับ ("+drafts.length+" รายการ)"),
      drafts.length===0 ? h("div",{className:"empty"},"ไม่มีฉบับร่างที่รอดำเนินการ") :
      drafts.map(d=>h("div",{className:"draft-card",key:d.id},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
          h("span",{className:"badge-draft"},"⏳ รอขากลับ"),
          h("button",{className:"btn-sm-danger",style:{padding:"3px 8px",fontSize:11},onClick:()=>delDrf(d.id)},"🗑 ลบ")
        ),
        h("div",{style:{fontWeight:700,fontSize:14,color:"#1e2d3d",marginBottom:4}},d.user),
        h("div",{style:{fontSize:12,color:"#64748b",marginBottom:2}},"📍 "+arrStr(d.places)),
        h("div",{style:{fontSize:12,color:"#64748b",marginBottom:2}},"🎯 "+arrStr(d.purposes)),
        h("div",{style:{fontSize:12,color:"#64748b",marginBottom:10}},"🗓 ออก "+fmtDate(d.departDate)+" เวลา "+fmtTime(d.departTime)+" น."+(d.vehicleType==="official"?" | กม.ออก: "+fn(d.kmOut):"")),
        h("button",{className:"btn-sm-success",onClick:()=>{setRetModal(d);setRetForm(emptyR());}},"✏️ กรอกข้อมูลขากลับ")
      ))
    ),
    h("button",{className:"btn-primary",onClick:()=>setTab(1)},"➕ บันทึกรายการใหม่")
  );

  /* ── Return Modal ── */
  const ReturnModal = ()=> retModal&&h("div",{className:"modal-wrap",onClick:e=>{if(e.target===e.currentTarget)setRetModal(null)}},
    h("div",{className:"modal-box"},
      h("div",{style:{fontSize:17,fontWeight:800,color:"#1a4a8a",marginBottom:4}},"🔙 กรอกข้อมูลขากลับ"),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
        h("span",{style:{fontSize:13,color:"#64748b"}},retModal.user),
        h("span",{className:retModal.vehicleType==="official"?"tag-gov":"tag-own"},retModal.vehicleType==="official"?"🏛 รถราชการ":"🚙 รถเจ้าหน้าที่")
      ),
      h("div",{className:"divider"}),
      retModal.vehicleType==="official"&&h(Field,{label:"เลขกิโลเมตรขากลับ",req:true},
        h(NumInput,{value:retForm.kmIn,onChange:v=>setRetForm(f=>({...f,kmIn:v})),placeholder:"เช่น 12,500"})
      ),
      retModal.vehicleType==="official"&&retForm.kmIn&&retModal.kmOut&&
        h("div",{className:"km-preview"},"🛣 ระยะทาง: "+fn(Math.max(0,pn(retForm.kmIn)-pn(retModal.kmOut)))+" กม."),
      retModal.vehicleType==="own"&&h(Field,{label:"ระยะทางรวมทั้งหมด (กม.)",req:true},
        h(NumInput,{value:retForm.totalDist,onChange:v=>setRetForm(f=>({...f,totalDist:v})),placeholder:"เช่น 120"})
      ),
      retModal.vehicleType==="own"&&retForm.totalDist&&
        h("div",{className:"km-preview"},"🛣 ระยะทางรวม: "+fn(retForm.totalDist)+" กม."),
      h("div",{className:"divider"}),
      /* ── เพิ่มสถานที่/วัตถุประสงค์ (ซ่อน/แสดง) ── */
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:retForm.showExtra?10:0}},
        h("span",{style:{fontSize:12,color:"#94a3b8"}},"สถานที่ / ไปเพื่อ เพิ่มเติม"),
        h("button",{
          style:{background:"none",border:"2px solid #2563eb",color:"#2563eb",borderRadius:"50%",
            width:28,height:28,cursor:"pointer",fontSize:18,lineHeight:1,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
            transform:retForm.showExtra?"rotate(45deg)":"rotate(0deg)",transition:"transform .2s"},
          onClick:()=>setRetForm(f=>({...f,showExtra:!f.showExtra}))
        },"+")
      ),
      retForm.showExtra&&h("div",{style:{marginTop:8}},
        h("div",{style:{fontSize:12,fontWeight:700,color:"#1a4a8a",marginBottom:6}},"📍 สถานที่ไปเพิ่มเติม"),
        ...(retForm.extraPlaces||[""]).map((p,i)=>
          h("div",{key:"ep"+i,style:{display:"flex",gap:6,marginBottom:8}},
            h("input",{className:"inp",style:{flex:1},placeholder:"สถานที่เพิ่ม "+(i+1),value:p,
              onChange:e=>setRetForm(f=>{const a=[...(f.extraPlaces||[])];a[i]=e.target.value;return{...f,extraPlaces:a};})}),
            i>0&&h("button",{className:"btn-sm-danger",onClick:()=>setRetForm(f=>({...f,extraPlaces:(f.extraPlaces||[]).filter((_,j)=>j!==i)}))},"✕")
          )
        ),
        (retForm.extraPlaces||[]).length<5&&h("button",{className:"add-btn",style:{marginBottom:12},
          onClick:()=>setRetForm(f=>({...f,extraPlaces:[...(f.extraPlaces||[]),""]}))},"+ เพิ่มสถานที่"),
        h("div",{style:{fontSize:12,fontWeight:700,color:"#1a4a8a",marginBottom:6}},"🎯 ไปเพื่อเพิ่มเติม"),
        ...(retForm.extraPurposes||[""]).map((p,i)=>
          h("div",{key:"epu"+i,style:{display:"flex",gap:6,marginBottom:8}},
            h("input",{className:"inp",style:{flex:1},placeholder:"วัตถุประสงค์เพิ่ม "+(i+1),value:p,
              onChange:e=>setRetForm(f=>{const a=[...(f.extraPurposes||[])];a[i]=e.target.value;return{...f,extraPurposes:a};})}),
            i>0&&h("button",{className:"btn-sm-danger",onClick:()=>setRetForm(f=>({...f,extraPurposes:(f.extraPurposes||[]).filter((_,j)=>j!==i)}))},"✕")
          )
        ),
        (retForm.extraPurposes||[]).length<5&&h("button",{className:"add-btn",
          onClick:()=>setRetForm(f=>({...f,extraPurposes:[...(f.extraPurposes||[]),""]}))},"+ เพิ่มวัตถุประสงค์")
      ),
      h("div",{className:"divider"}),
      h("div",{className:"row2"},
        h(Field,{label:"วันที่กลับ",req:true},h("input",{type:"date",className:"inp",value:retForm.returnDate,onChange:e=>setRetForm(f=>({...f,returnDate:e.target.value}))})),
        h(Field,{label:"เวลากลับ",req:true},h(TimePicker,{value:retForm.returnTime,onChange:v=>setRetForm(f=>({...f,returnTime:v}))}))
      ),
      h(Field,{label:"หมายเหตุ"},h("input",{className:"inp",placeholder:"หมายเหตุ (ถ้ามี)",value:retForm.note,onChange:e=>setRetForm(f=>({...f,note:e.target.value}))})),
      h("div",{className:"divider"}),
      h("div",{style:{fontSize:13,fontWeight:700,color:"#1a4a8a",marginBottom:8}},"⛽ การเบิกน้ำมัน"),
      h("div",{className:"row2"},
        h(Field,{label:"เบิกน้ำมัน (ลิตร)"},h(NumInput,{value:retForm.fuelLiters,onChange:v=>setRetForm(f=>({...f,fuelLiters:v})),placeholder:"เช่น 30"})),
        h(Field,{label:"ราคาน้ำมัน (บาท/ลิตร)"},h(NumInput,{value:retForm.fuelPrice,onChange:v=>setRetForm(f=>({...f,fuelPrice:v})),placeholder:"เช่น 35.50"}))
      ),
      retForm.fuelLiters&&retForm.fuelPrice&&h("div",{className:"fuel-preview",style:{marginBottom:10}},"💰 รวม: "+fn(pn(retForm.fuelLiters)*pn(retForm.fuelPrice))+" บาท"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}},
        h("button",{className:"btn-outline",onClick:()=>setRetModal(null)},"ยกเลิก"),
        h("button",{className:"btn-success",onClick:submitReturn},"✅ บันทึกสมบูรณ์")
      )
    )
  );

  return h("div",{className:"app"},
    h("div",{className:"header"},
      h("div",{className:"hrow"},
        h("div",null,
          h("div",{style:{fontSize:17,fontWeight:800}},"📋 บันทึกการใช้รถราชการ"),
          h("div",{style:{fontSize:12,opacity:.8,marginTop:2}},"สอน.บ้านโคกแสง · สกลนคร")
        ),
        h("div",{className:"plate"},
          h("div",{className:"plate-num"},"ผข 1179"),
          h("div",{className:"plate-prov"},"สกลนคร")
        )
      )
    ),
    h("div",{className:"tabbar"},
      ...[{l:"🏠 หน้าแรก"},{l:"➕ บันทึก"},{l:"📝 ฉบับร่าง",b:drafts.length||null}].map(({l,b},i)=>
        h("button",{key:i,className:"tab"+(tab===i?" active":""),onClick:()=>setTab(i)},
          l, b&&h("span",{className:"badge-num"},b)
        )
      )
    ),
    h("div",{className:"body"},
      error&&h("div",{className:"err-bar"},
        h("span",null,"⚠️ "+error),
        h("button",{className:"btn-sm-refresh",onClick:fetchAll},"ลองใหม่")
      ),
      tab===0&&Tab0(),
      tab===1&&Tab1(),
      tab===2&&Tab2(),
    ),
    ReturnModal(),
    toast&&h("div",{className:"toast"},toast)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
